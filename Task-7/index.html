<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium user directory fetched from JSONPlaceholder API using Fetch API.">
    <title>User Directory | API Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1 class="title">Network <span class="accent">Directory</span></h1>
            <p class="subtitle">Fetching real-time user data from JSONPlaceholder API</p>
            <div class="controls">
                <button id="reload-btn" class="btn btn-primary">
                    <span class="btn-text">Refetch Data</span>
                    <span class="loader"></span>
                </button>
            </div>
        </header>

        <section id="user-grid" class="user-grid">
            <!-- User cards will be injected here -->
            <div class="initial-state">
                <p>Click the button to load users...</p>
            </div>
        </section>

        <div id="error-container" class="error-container hidden">
            <div class="error-card">
                <div class="error-icon">!</div>
                <h3>Connection Failed</h3>
                <p id="error-message">Unable to fetch user data. Please check your internet connection.</p>
                <button id="retry-btn" class="btn btn-outline">Try Again</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
